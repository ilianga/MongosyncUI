name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Runs the unit suite via `test:ci`, which EXCLUDES
      # src/lib/__tests__/supervision.integration.test.ts. That integration suite
      # is skipped in CI because it requires tmux on the runner and spawns real
      # mongosync wrapper processes — neither is available in a hosted CI runner.
      # Run it locally with `npm run test:integration`.
      - name: Test (unit)
        run: npm run test:ci

      - name: Build
        run: npm run build
